<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <h1>Check if the number is even or odd.</h1>

    <input type="number"id="numberInput" placeholder ="Enter a number"> <br><br>
    
    <button onclick="checkEvenOdd()">check the number</button>
    <p id="result"></p>


    <script scr="">
          function checkEvenOdd(){
                 const number =document.getElementById("numberInput").value;


                 if (number % 2===0){
                      document.getElementById("result").innerText = "Even";
                     }
                else{
                 document.getElementById("result").innerText = "Odd";
                    }
                  }

    </script>
    
</body>
</html>
