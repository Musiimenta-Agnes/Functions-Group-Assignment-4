    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celsius to Fahrenheit Converter</title>
</head>
<body>

    <h1>Convert Celsius to Fahrenheit</h1>

    <!-- Input Field for Celsius -->
    <label for="celsius">Enter temperature in Celsius:</label>
    <input type="number" id="celsius" placeholder="Celsius">
    
    <!-- Button to trigger the conversion -->
    <button onclick="convertToFahrenheit()">Convert</button>
    
    <!-- Paragraph to display the Fahrenheit result -->
    <p id="result"></p>

    <script>
        // Function to convert Celsius to Fahrenheit
        function convertToFahrenheit() {
            // Get the Celsius value from the input
            var celsius = parseFloat(document.getElementById("celsius").value);
            
            // Apply the conversion formula: F = (C * 9/5) + 32
            var fahrenheit = (celsius * 9/5) + 32;
            
            // Display the result in Fahrenheit
            document.getElementById("result").textContent = celsius + "°C is equal to " + fahrenheit.toFixed(2) + "°F.";
        }
    </script>

</body>
</html>

</body>
